services:
  # Aplicación de ejemplo que expone métricas
  app-ejemplo:
    build: ./app
    container_name: app-monitorizacion
    ports:
      - "8000:8000"
    networks:
      - monitoring
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Servidor Prometheus para recopilar métricas  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - /docker/monitor-stack/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /docker/monitor-stack/prometheus/rules:/etc/prometheus/rules
      - /docker/monitor-stack/prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - monitoring
    restart: always

  # Loki para agregación de logs
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - /docker/monitor-stack/loki/loki-config.yaml:/etc/loki/local-config.yaml
      - /docker/monitor-stack/loki/data:/loki
    networks:
      - monitoring
    restart: always

  # Alloy para logs (reemplaza promtail)
  alloy:
    image: grafana/agent:latest
    container_name: alloy
    restart: always
    ports:
      - "3101:12345"  # Puerto para métricas de Alloy
    volumes:
      - /docker/monitor-stack/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: ["-config.file=/etc/alloy/config.alloy"]
    networks:
      - monitoring
    depends_on:
      - loki

  # Servidor Grafana para visualización
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - /docker/monitor-stack/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - /docker/monitor-stack/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - /docker/monitor-stack/grafana/dashboards:/var/lib/grafana/dashboards
      - /docker/monitor-stack/grafana/data:/var/lib/grafana
    networks:
      - monitoring
    restart: always
    depends_on:
      - prometheus
      - loki

  # Node Exporter para métricas del sistema
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring
    restart: always

networks:
  monitoring:
    driver: bridge