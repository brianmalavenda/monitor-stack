version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - /docker/monitor-stack/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /docker/monitor-stack/prometheus/rules:/etc/prometheus/rules
      - /docker/monitor-stack/prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - /docker/monitor-stack/grafana/data:/var/lib/grafana
    networks:
      - monitoring
    restart: always

networks:
  monitoring:
    driver: bridge